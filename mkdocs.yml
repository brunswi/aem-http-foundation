# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: AEM HTTP Foundation
site_url: https://aem.kttn.org/aem-http-foundation/
repo_url: https://github.com/brunswi/aem-http-foundation
theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  font:
    text: Work Sans
    code: Fira Code
  palette:
    scheme: default
    primary: black
    accent: indigo
extra:
  social:
    - icon: custom/lgbtqia+
      link: "#"

extra_css:
  - stylesheets/extra.css
plugins:
  - search
nav:
  - Home: index.md
  - Details: core.md
