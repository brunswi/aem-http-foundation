name: Dependency Submission

on:
  push:
    branches: [ "develop" ]

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: advanced-security/maven-dependency-submission-action@v4
