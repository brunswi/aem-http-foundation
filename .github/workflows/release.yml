name: Release

# Triggered manually from the GitHub Actions UI.
# Handles the full release cycle:
#   set version → build → sign → deploy to Central → tag → merge to main → bump develop
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.9.1)'
        required: true
      next_version:
        description: 'Next development version (e.g. 0.9.2-SNAPSHOT)'
        required: true

# RELEASE_TOKEN (a PAT) is used for git operations so pushes to the protected
# main branch succeed without a pull request.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      # setup-java imports the GPG key, creates a gpg-agent, and writes a
      # settings.xml entry for the Central server — no manual settings.xml needed.
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: mvn -B versions:set -DnewVersion=${{ inputs.release_version }} -DgenerateBackupPoms=false

      # -P release activates sources, Javadoc, and GPG signing.
      # autoPublish + waitUntil=published make the Central upload fully hands-off.
      - name: Build, sign, and deploy to Maven Central
        run: mvn -B deploy -P release -DautoPublish=true -DwaitUntil=published
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Commit release version and create tag
        run: |
          git commit -am "chore(release): ${{ inputs.release_version }}"
          git tag aem-http-foundation-${{ inputs.release_version }}

      - name: Merge develop → main
        run: |
          git checkout main
          git pull origin main
          git merge develop --no-ff -m "chore(release): merge ${{ inputs.release_version }} to main"
          git push origin main
          git push origin aem-http-foundation-${{ inputs.release_version }}

      - name: Bump develop to next SNAPSHOT
        run: |
          git checkout develop
          mvn -B versions:set -DnewVersion=${{ inputs.next_version }} -DgenerateBackupPoms=false
          git commit -am "[maven-scm] prepare for next development iteration"
          git push origin develop
