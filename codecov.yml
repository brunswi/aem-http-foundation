# Codecov configuration for aem-http-foundation
# https://docs.codecov.com/docs/codecov-yaml

# Ignore patterns: exclude test code and package-info from coverage metrics.
ignore:
  - "**/package-info.java"
  - "**/src/test/**"
  - "**/*Test.java"
  - "**/*Tests.java"

# Coverage targets and thresholds
#
# partial_coverage_as_fully_covered: align Codecov with JaCoCo's LINE counter.
# JaCoCo counts a line as covered if any instruction ran, even when some branches
# were not taken ("partial hit"). Without this flag Codecov counts partials as
# misses, producing ~70% instead of the ~82% the JaCoCo HTML report shows.
coverage:
  partial_coverage_as_fully_covered: true
  status:
    project:
      default:
        target: 75%       # Aim for 75% project-wide coverage
        threshold: 2%     # Allow 2% drop without marking PR as failed
    patch:
      default:
        target: 70%       # New code in PRs should be at least 70% covered
        threshold: 5%

# Comment on PRs with coverage summary and file-level changes
comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
